<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maintenance in Progress</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0f172a, #0b3a59);
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: #e2e8f0;
    }
    main {
      width: min(640px, 92vw);
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(2, 6, 23, 0.45);
      text-align: center;
    }
    h1 { margin: 0 0 12px; font-size: 1.9rem; color: #f8fafc; }
    p { margin: 8px 0; line-height: 1.6; color: #cbd5e1; }
    small { display: block; margin-top: 14px; color: #94a3b8; }
  </style>
</head>
<body>
  <main>
    <h1>We are performing a quick maintenance</h1>
    <p>The platform is temporarily unavailable while we restart services.</p>
    <p>Please refresh in a few moments.</p>
    <small>Innexar platform operations</small>
  </main>
</body>
</html>
