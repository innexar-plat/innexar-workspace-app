# Desenvolvimento: código montado em volume e next dev.
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  innexar-workspace-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      args:
        - NEXT_PUBLIC_USE_WORKSPACE_API=${NEXT_PUBLIC_USE_WORKSPACE_API:-true}
        - NEXT_PUBLIC_WORKSPACE_API_URL=${NEXT_PUBLIC_WORKSPACE_API_URL:-https://api.innexar.com.br}
    volumes:
      - .:/app
      - workspace_app_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_WORKSPACE_API_URL=${NEXT_PUBLIC_WORKSPACE_API_URL:-https://api.innexar.com.br}

volumes:
  workspace_app_node_modules: