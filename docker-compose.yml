services:
  innexar-workspace-app:
    image: ${IMAGE_REPOSITORY:-ghcr.io/innexar-plat/innexar-brasil}/workspace-app:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_USE_WORKSPACE_API=${NEXT_PUBLIC_USE_WORKSPACE_API:-true}
        - NEXT_PUBLIC_WORKSPACE_API_URL=${NEXT_PUBLIC_WORKSPACE_API_URL:-https://api.innexar.com.br}
    container_name: innexar-workspace-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_USE_WORKSPACE_API=${NEXT_PUBLIC_USE_WORKSPACE_API:-true}
      - NEXT_PUBLIC_WORKSPACE_API_URL=${NEXT_PUBLIC_WORKSPACE_API_URL:-https://api.innexar.com.br}
    env_file:
      - .env
    networks:
      - fixelo_fixelo-network
    labels:
      - "innexar.scope=br"
      - "traefik.enable=true"
      - "traefik.http.routers.innexar-workspace-app.rule=Host(`app.innexar.com.br`)"
      - "traefik.http.routers.innexar-workspace-app.entrypoints=websecure"
      - "traefik.http.routers.innexar-workspace-app.tls.certresolver=cloudflare"
      - "traefik.http.routers.innexar-workspace-app.service=innexar-workspace-app-service"
      - "traefik.http.services.innexar-workspace-app-service.loadbalancer.server.port=3000"
      - "traefik.http.services.innexar-workspace-app-service.loadbalancer.passHostHeader=true"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  fixelo_fixelo-network:
    external: true
